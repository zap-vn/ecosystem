name: ZAP CD Pipeline (Deploy to GHCR & GCP Cloud Run)

on:
  push:
    branches:
      - dev
      - develop
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GCP_REGION: asia-southeast1

jobs:
  build-and-push-ghcr:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Build & Push Identity Service ---
      - name: Extract metadata for Identity Service
        id: meta_identity
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/identity

      - name: Build and push Identity Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta_identity.outputs.tags }}
          labels: ${{ steps.meta_identity.outputs.labels }}

      # --- Build & Push CRM Service ---
      - name: Extract metadata for CRM Service
        id: meta_crm
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/crm

      - name: Build and push CRM Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.CRM
          push: true
          tags: ${{ steps.meta_crm.outputs.tags }}
          labels: ${{ steps.meta_crm.outputs.labels }}

  deploy-to-gcp:
    name: Deploy to Google Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push-ghcr
    permissions:
      contents: read
      id-token: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Deploy Identity Service to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: zap-identity-service
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/identity:dev
          region: ${{ env.GCP_REGION }}
          env_vars: |
            ASPNETCORE_ENVIRONMENT=Production

      - name: Deploy CRM Service to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: zap-crm-service
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/crm:dev
          region: ${{ env.GCP_REGION }}
          env_vars: |
            ASPNETCORE_ENVIRONMENT=Production
