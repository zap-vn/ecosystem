name: ZAP CD Pipeline (Deploy GCP Cloud Run)

on:
  push:
    branches:
      - dev
      - develop
      - main
  workflow_dispatch:

env:
  GCP_REGION: asia-southeast1
  PROJECT_ID: zapcrm-492101
  AR_REPO: crm-repo
  AR_HOSTNAME: asia-southeast1-docker.pkg.dev

jobs:
  build-and-deploy:
    name: Build & Deploy to Google Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use Google Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_HOSTNAME }}

      # --- Build & Push Identity Service ---
      - name: Build Identity Docker image
        run: docker build -t ${{ env.AR_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/zap-identity-service:${{ github.sha }} -f Dockerfile .
      
      - name: Push Identity Docker image
        run: docker push ${{ env.AR_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/zap-identity-service:${{ github.sha }}

      # --- Build & Push CRM Service ---
      - name: Build CRM Docker image
        run: docker build -t ${{ env.AR_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/zap-crm-service:${{ github.sha }} -f Dockerfile.CRM .
      
      - name: Push CRM Docker image
        run: docker push ${{ env.AR_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/zap-crm-service:${{ github.sha }}

      # --- Deploy Identity Service to Cloud Run ---
      - name: Deploy Identity Service to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: zap-identity-service
          image: ${{ env.AR_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/zap-identity-service:${{ github.sha }}
          region: ${{ env.GCP_REGION }}
          env_vars: |
            ASPNETCORE_ENVIRONMENT=Production

      # --- Deploy CRM Service to Cloud Run ---
      - name: Deploy CRM Service to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: zap-crm-service
          image: ${{ env.AR_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/zap-crm-service:${{ github.sha }}
          region: ${{ env.GCP_REGION }}
          env_vars: |
            ASPNETCORE_ENVIRONMENT=Production
