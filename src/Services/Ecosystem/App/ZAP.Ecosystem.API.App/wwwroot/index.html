<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZAP App • API Explorer (Scalar)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0f172a;
            --accent-primary: #10b981;
            --accent-secondary: #3b82f6;
            --text-main: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-base);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #064e3b, #0f172a);
            padding: 4rem 2rem;
            text-align: center;
            border-bottom: 4px solid var(--accent-primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, #ffffff, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 3rem;
            max-width: 600px;
            text-align: center;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 1rem;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
            margin: 1rem;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: #064e3b;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .status {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>App API Portal</h1>
        <p>Customer Experience & Loyalty Module</p>
    </div>
    <div class="main">
        <div class="card">
            <h2>Interactive Documentation</h2>
            <p>Explore the App microservice endpoints, including Customer Profile, Membership, and Loyalty logic via Scalar Gateway.</p>
            <div style="margin-top: 2rem;">
                <a href="/docs/app/v1" class="btn btn-primary" target="_blank">Open Scalar Docs</a>
                <a href="https://localhost:7278/" class="btn btn-secondary">Back to Gateway</a>
            </div>
            <div class="status">
                Connected to: <strong>Ecosystem Cluster</strong> | Status: <span style="color: #10b981;">● Online</span>
            </div>
        </div>
    </div>
</body>
</html>
