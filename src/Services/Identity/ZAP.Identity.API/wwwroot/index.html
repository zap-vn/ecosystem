<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZAP Identity • API Explorer (Swagger)</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <!-- Swagger UI Native CSS -->
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css" />
    
    <style>
        :root {
            --bg-base: #0f172a;
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --text-main: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            background: #ffffff; /* Swagger is natively light-themed */
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        /* ------------------------------------- \
           Premium Top-Head Bar for Ecosystem    
        \--------------------------------------- */
        .zap-header {
            background: var(--bg-base);
            background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(129, 140, 248, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            padding: 2rem;
            text-align: center;
            border-bottom: 4px solid var(--accent-primary);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .badge {
            display: inline-block;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-primary);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .zap-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 0.5rem 0;
        }

        .zap-header p {
            color: #cbd5e1;
            font-size: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(-3px);
        }

        /* ------------------------------------- \
           Custom Tweaks to standard Swagger UI    
        \--------------------------------------- */
        .swagger-ui .topbar { display: none; } /* Hide default ugly topbar */
        #swagger-ui {
            max-width: 1460px;
            margin: 0 auto;
            padding: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- ZAP Ecosystem Header -->
    <div class="zap-header">
        <a href="https://localhost:7278/" class="back-btn">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 12H3m0 0l7-7m-7 7l7 7"/></svg>
            Gateway Portal
        </a>
        <div class="badge">Identity Node</div>
        <h1>API Documentation</h1>
        <p>Real-time interactive Swagger UI rendering data direct from .NET 10 System Configuration mapped specifically for the Identity Cluster.</p>
    </div>

    <!-- The Swagger Injection Point -->
    <div id="swagger-ui"></div>

    <!-- Swagger UI Logic -->
    <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js" crossorigin></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-standalone-preset.js" crossorigin></script>
    <script>
        window.onload = () => {
            window.ui = SwaggerUIBundle({
                url: '/openapi/v1.json', // NATIVE Endpoint generated by builder.Services.AddOpenApi()
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "BaseLayout", // Removes the top bar completely along with custom CSS mapping
                defaultModelsExpandDepth: -1 // Custom ZAP Default: Hide heavy schemas list
            });
        };
    </script>

</body>
</html>
